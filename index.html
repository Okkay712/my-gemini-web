<!DOCTYPE html>
<html>
<head>
    <title>Gemini 多模型测试</title>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; line-height: 1.6; }
        #chatbox { border: 1px solid #ddd; height: 400px; overflow-y: auto; padding: 15px; margin-bottom: 15px; background: #f9f9f9; border-radius: 8px; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        input { flex-grow: 1; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h2>Gemini 多模型聊天室</h2>
    
    <div class="controls">
        <label>选择模型：</label>
        <select id="modelSelect">
            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
            <option value="gemini-3-pro-preview">Gemini 3 Pro Preview</option>
            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
            <option value="gemini-2.0-pro-exp-02-05">Gemini 2.0 Pro Exp</option>
            <option value="deep-research-pro-preview-12-2025">Deep Research Pro</option>
        </select>
    </div>

    <div id="chatbox"></div>
    
    <div class="controls">
        <input type="text" id="userInput" placeholder="输入你的问题...">
        <button onclick="send()">发送</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chatbox');
            const modelSelect = document.getElementById('modelSelect');
            
            const text = input.value;
            const selectedModel = modelSelect.value;
            
            if(!text) return;

            box.innerHTML += `<p><b>你 (${selectedModel}):</b> ${text}</p>`;
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        prompt: text,
                        modelName: selectedModel // 把选中的模型传给后端
                    })
                });
                const data = await res.json();
                box.innerHTML += `<p><b>AI:</b> ${data.text || "错误: " + data.error}</p>`;
            } catch (e) {
                box.innerHTML += `<p style="color:red">网络错误: ${e.message}</p>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
