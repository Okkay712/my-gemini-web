<!DOCTYPE html>
<html>
<head>
    <title>Gemini 全能模型实验室</title>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #chatbox { border: 1px solid #eee; height: 450px; overflow-y: auto; padding: 15px; margin-bottom: 15px; background: #fff; border-radius: 8px; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        select, input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        input { flex-grow: 1; font-size: 16px; }
        button { padding: 12px 25px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        .status-info { font-size: 12px; color: #666; margin-bottom: 10px; padding: 10px; background: #eef; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Gemini 全能模型实验室</h2>
        
        <div class="status-info">
            💡 提示：如果 3.1 系列报 429 错误，请切换到 <b>1.5 Flash</b> 或 <b>2.0 Flash</b>，它们的额度最高。
        </div>

        <div class="controls">
            <label>选择模型：</label>
            <select id="modelSelect">
                <!-- 额度最高的保底模型 -->
                <option value="gemini-1.5-flash">Gemini 1.5 Flash (最稳/额度最高)</option>
                <option value="gemini-2.0-flash">Gemini 2.0 Flash (极速/推荐)</option>
                
                <!-- 顶级预览模型 -->
                <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (顶级/额度极少)</option>
                <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
                <option value="gemini-3-pro-preview">Gemini 3 Pro Preview</option>
                <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                <option value="deep-research-pro-preview-12-2025">Deep Research (深度研究)</option>
            </select>
        </div>

        <div id="chatbox"></div>
        
        <div class="controls">
            <input type="text" id="userInput" placeholder="输入你的指令...">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chatbox');
            const model = document.getElementById('modelSelect').value;
            const text = input.value;
            if(!text) return;

            box.innerHTML += `<div style="margin-bottom:10px;"><b>你:</b> ${text}</div>`;
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: text, modelName: model })
                });
                const data = await res.json();
                
                let aiResponse = data.text || "错误: " + (data.error || "未知响应");
                box.innerHTML += `<div style="margin-bottom:20px; color:#1a73e8;"><b>AI (${model}):</b><br>${aiResponse}</div>`;
            } catch (e) {
                box.innerHTML += `<div style="color:red;">网络错误: ${e.message}</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
